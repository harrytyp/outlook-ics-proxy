version: '3.8'

services:
  outlook-ics-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outlook-ics-proxy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PORT: 8080
      FLASK_DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8080/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
